version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: dra_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dra}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dra_secret}
      POSTGRES_DB: dra_platform
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dra -d dra_platform"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dra_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - AUTH_SECRET=${AUTH_SECRET}
        - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
        - BACKEND_URL=http://localhost:8080
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    environment:
      - NODE_ENV=production
      - PORT=${PORT:-3000}
      - BACKEND_URL=http://localhost:8080
      - DATABASE_URL=${DATABASE_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - AUTH_SECRET=${AUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - DB_TYPE=${DB_TYPE:-postgres}
      - ENV=production
      - RATE_LIMIT_RPM=60
      - REDIS_URL=redis://redis:6379
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  mongodb:
    image: mongo:7
    container_name: dra_mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: dra_platform
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    profiles:
      - mongo

volumes:
  postgres_data:
  mongodb_data:
  redis_data:
